<div class="container mt-4" *ngIf="!isPrinting">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Customer List</h5>
            <button class="btn btn-primary" (click)="printCustomers()">
                <i class="fas fa-print me-2 animate-icon"></i> Print Customers
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive" style="max-height: 350px; overflow-y: auto;">
                <table class="table table-bordered table-striped mb-0">
                    <thead class="table-header">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let customer of customers">
                            <td>{{ customer.name }}</td>
                            <td>{{ customer.email }}</td>
                            <td>{{ customer.address }}</td>
                            <td>
                                <a [routerLink]="['/customers/edit', customer.customerCode]">
                                    <button class="btn btn-warning btn-sm me-2">
                                        <i class="fas fa-edit me-1"></i> Edit
                                    </button>
                                </a>
                                <a href="javascript:void(0)" (click)="deleteCustomer(customer.customerCode || 0)">
                                    <button class="btn btn-danger btn-sm">
                                        <i class="fas fa-trash me-1"></i> Delete
                                    </button>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Print Section -->
<div id="CustomerPrintTable" *ngIf="isPrinting">
    <h3>Customer List</h3>
    <table class="table table-bordered table-striped mb-0">
        <thead class="table-header">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let customer of customers">
                <td>{{ customer.name }}</td>
                <td>{{ customer.email }}</td>
                <td>{{ customer.address }}</td>
            </tr>
        </tbody>
    </table>
</div>
